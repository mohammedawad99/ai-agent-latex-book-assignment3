# Default planned configuration for the agentic LaTeX book pipeline.
#
# This file holds non-secret settings only. Secrets (API keys) come from the
# environment / a local .env file, never from here. The values below are the
# planned defaults; the pipeline that consumes them is not implemented yet.

[project]
# Working topic for the generated article/book (matches the PRD/PLAN).
topic = "From PoC to Production: Building Reliable AI Agent Systems with CrewAI, LaTeX, Observability, Security, and Cost Awareness"
group_code = "MaRs-777"

[paths]
# Output / evidence locations, relative to the repository root.
latex_project = "latex_project"
results = "results"
logs = "results/logs"
crew_outputs = "results/crew_outputs"
validation_reports = "results/validation_reports"
final_pdf = "results/final_pdf"
assets_generated = "assets/generated"
assets_figures = "assets/figures"

[pdf]
# Placeholder page-count thresholds for the future page-count gate.
# Final values are confirmed in Stage 12 (see docs/QUALITY.md).
page_count_min = 13
page_count_max = 17

[model]
# Placeholders only. The real provider/model are selected and recorded in
# docs/DECISIONS.md, and the API key is supplied via the environment.
provider = ""
name = ""

[cost]
# Whether per-run cost/resource tracking is enabled (see docs/COSTS.md).
tracking_enabled = true
