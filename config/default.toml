# Default configuration for the agentic LaTeX book pipeline.
#
# This file holds non-secret settings only. Secrets (API keys) come from the
# environment / a local .env file, never from here. These are the non-secret
# defaults consumed by the safe offline commands (status, crew-plan, dry-runs)
# and by explicit real runs (run-minimal/run-full --real).

[project]
# Project topic/title the generated content MUST be written about (Stage 8C.6
# hardening, see docs/DECISIONS.md D-025). The crew is bound to this topic.
topic = "From PoC to Production: A CrewAI Multi-Agent Pipeline for Generating a LaTeX Book"
group_code = "MaRs-777"
authors = ["Mohamed Awad", "Rawey Sleiman"]
assignment_context = "AI agents / CrewAI / LaTeX book generation assignment"
# Configurable project date used on the cover (no stale hardcoded dates).
project_date = "2026-06-11"

[paths]
# Output / evidence locations, relative to the repository root.
latex_project = "latex_project"
results = "results"
logs = "results/logs"
crew_outputs = "results/crew_outputs"
validation_reports = "results/validation_reports"
final_pdf = "results/final_pdf"
assets_generated = "assets/generated"
assets_figures = "assets/figures"

[pdf]
# Placeholder page-count thresholds for the future page-count gate.
# Final values are confirmed in Stage 12 (see docs/QUALITY.md).
page_count_min = 13
page_count_max = 17

[model]
# Placeholders only. The real provider/model are selected and recorded in
# docs/DECISIONS.md, and the API key is supplied via the environment.
provider = ""
name = ""

[cost]
# Whether per-run cost/resource tracking is enabled (see docs/COSTS.md).
tracking_enabled = true
